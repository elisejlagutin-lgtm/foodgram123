volumes:
  pg_data:
  static:
  ssl_data:  # объём для SSL‑сертификатов

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend/
    env_file: .env
    volumes:
      - static:/app/static

  frontend:
    build: ./frontend/
    volumes:
      - static:/app/build

  gateway:
    build: ./nginx/
    volumes:
      - static:/app/static
      - ./ssl-certs:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    ports:
      - 7000:80
